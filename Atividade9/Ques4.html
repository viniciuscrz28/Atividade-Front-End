<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Bank</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            width: 350px;
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
        }

        input, select{
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        button{
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover{
            background-color: #0056b3;
        }

        #resultado{
            margin-top: 20px;
            font-size: 17px;
            line-height: 28px;
        }

    </style>
</head>
<body>

    <div class="container">

        <h2>Infinity Bank</h2>

        <select id="bandeira">
            <option value="visa">Visa</option>
            <option value="master">Master</option>
            <option value="elo">Elo</option>
        </select>

        <input type="number" class="form-control number" id="valor" placeholder="Valor da venda" inputmode="numeric">

        <input type="number" id="parcelas" placeholder="Quantidade de parcelas">

        <button id="calcular">Calcular</button>

        <div id="resultado"></div>

    </div>

    <script src="js/Ques4.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>

</body>
</html>
