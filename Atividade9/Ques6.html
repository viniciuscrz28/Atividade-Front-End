<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Crédito para Festas & Eventos</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card{
            width: 400px;
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
        }

        label{
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        select, input{
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        button{
            width: 100%;
            padding: 10px;
            border: none;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: #0056b3;
        }

        #resultado{
            margin-top: 20px;
            line-height: 30px;
        }

    </style>

</head>
<body>

    <div class="card">

        <h2>Crédito para Festas & Eventos</h2>

        <label>Pacote</label>

        <select id="pacote">
            <option value="50">Standard</option>
            <option value="80">Premium</option>
            <option value="120">Infinity Deluxe</option>
        </select>

        <label>Quantidade de Pessoas</label>

        <input type="number" id="pessoas" min="1">

        <button id="calcular">
            Calcular Orçamento
        </button>

        <div id="resultado"></div>

    </div>

    <script src="js/Ques6.js"></script>

</body>
</html>
