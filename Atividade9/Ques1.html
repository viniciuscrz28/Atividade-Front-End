<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de CPF</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        button{
            padding: 10px 20px;
            border: none;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover{
            background-color: #0056b3;
        }

        #resultado{
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
        }

        .valido{
            color: green;
        }

        .invalido{
            color: red;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Validador de CPF</h2>

        <input type="text" id="cpf" placeholder="Digite o CPF">

        <button onclick="validarCPF()">Validar</button>

        <p id="resultado"></p>
    </div>

    <script src="js/Ques1.js"></script>

</body>
</html>
