<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média Escolar</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            width: 350px;
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        button{
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover{
            background-color: #0056b3;
        }

        #resultado{
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
        }

        .aprovado{
            color: blue;
        }

        .exame{
            color: green;
        }

        .reprovado{
            color: red;
        }

    </style>
</head>
<body>

    <div class="container">

        <h2>Média Escolar</h2>

        <input type="text" id="nome" placeholder="Nome do aluno">

        <input type="number" id="nota1" placeholder="Nota 1">

        <input type="number" id="nota2" placeholder="Nota 2">

        <input type="number" id="nota3" placeholder="Nota 3">

        <button id="calcular">Calcular Média</button>

        <div id="resultado"></div>

    </div>

    <script src="js/Ques3.js"></script>

</body>
</html>
