<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Temperatura</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            width: 320px;
            text-align: center;
        }

        h2{
            margin-bottom: 20px;
        }

        .campo{
            margin-bottom: 20px;
            text-align: left;
        }

        label{
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input{
            width: 100%;
            padding: 10px;
            font-size: 16px;
        }

    </style>
</head>
<body>

    <div class="container">

        <h2>Conversor de Temperatura</h2>

        <div class="campo">
            <label>Celsius (°C)</label>
            <input type="number" id="celsius" step="0.1">
        </div>

        <div class="campo">
            <label>Fahrenheit (°F)</label>
            <input type="number" id="fahrenheit" step="0.1">
        </div>

    </div>

    <script src="js/Ques2.js"></script>

</body>
</html>
