<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Caixa Livre - Pagina de Blocos de Notas</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

        <style>
            .topo{
            background: #ffc107;
            text-align:center;
            font-size: 43px;
	    font-weight: blod;
            border: 2px solid #110c8a;	
            }
	    .painel{
		background: #ddd;
		padding: 10px;
		border: 2px solid #110c8a;
	    }
	    .total{
		font-size: 28px;
		font-weight: blod;
		text-align: right;
	    }
        </style>

    </head>
<body class="bg-primary bg-gradient">
    <div class="container mt-3">
        <div class="topo">Caixa Livre</div>
        <div class="row mt-2">

            <div class="col-md-7">
                <h3 class="text-white"><span class="badge text-bg-primary">Sua Compra</span></h3>
                <ul id="lista" class="list-group lista"> </ul>
            </div>
            <div class="col-md-5">
                    <div class="painel total"> Total: R$ <span id="total">0,00</span></div>
                    <div class="painel">
                <label>Código de barras</label>
                <input type="text" id="cod" class="form-control">
            </div>
            <div class="painel">
                <label>Quantidade</label>
                <input type="number" id="qtd" class="form-control" value="1">
            </div>
            <button class="btn btn-success w-100" onclick="addProduto()">Adicionar Produto</button>

        </div>

    </div>

    <script src="caixaLivre.js"></script>
</body>
</html>
